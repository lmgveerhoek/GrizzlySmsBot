<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in | Grizzly SMS</title>
  <script>document.documentElement.dataset.theme = localStorage.getItem("grizzly-theme") || (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");</script>
  <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>
<body class="login-page">
  <main class="login-card">
    <p class="eyebrow">Local control panel</p>
    <h1>Grizzly SMS</h1>
    <p class="muted">Enter the local dashboard password to continue.</p>
    {% if error %}<p class="form-error">{{ error }}</p>{% endif %}
    <form method="post" action="{{ url_for('login_submit') }}">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" autofocus required>
      <button class="button primary" type="submit">Sign in</button>
    </form>
  </main>
</body>
</html>
