services:
  grizzlysms-bot:
    build: .
    container_name: grizzlysms-bot
    restart: "no"
    init: true
    env_file:
      - .env
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - grizzlysms-state:/data
    environment:
      STATE_DB_PATH: ${STATE_DB_PATH:-/data/grizzlysms.db}
      WEB_UI_HOST: 0.0.0.0
      WEB_UI_PORT: 8080
    ports:
      - "127.0.0.1:${WEB_UI_PORT:-8080}:8080"

volumes:
  grizzlysms-state:
