services:
  grizzlysms-bot:
    build: .
    container_name: grizzlysms-bot
    restart: "no"
    init: true
    env_file:
      - .env
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - grizzlysms-state:/data
    environment:
      STATE_DB_PATH: ${STATE_DB_PATH:-/data/grizzlysms.db}

volumes:
  grizzlysms-state:
